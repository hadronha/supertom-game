<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SuperTom: A Jornada do Coração Elétrico — 16-bit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* Botão de som flutuante */
    #soundBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      border: 2px solid #00FFFF;
      color: #00FFFF;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      transition: background 0.2s, border-color 0.2s;
    }
    #soundBtn:hover { background: rgba(0,255,255,0.15); }
    #soundBtn.muted { border-color: #555; color: #555; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Botão de som -->
  <button id="soundBtn" title="Ligar/Desligar Música">♪</button>

  <!-- Engine 16-bit (inclui musicSystem integrado) -->
  <script src="game16.js"></script>

  <script>
    // ─── CONTROLE DO BOTÃO DE SOM ────────────────────────────────
    const soundBtn = document.getElementById('soundBtn');
    let isMuted = false;

    // Desbloquear áudio na primeira interação do usuário
    function unlockAudio() {
      if (typeof musicSystem !== 'undefined') {
        // Tentar tocar a música atual se estiver pausada
        const track = musicSystem.current;
        if (track && musicSystem[track] && musicSystem[track].paused) {
          musicSystem[track].play().catch(() => {});
          musicSystem._fadeIn(musicSystem[track]);
        }
      }
    }

    ['click', 'touchstart', 'keydown'].forEach(evt => {
      document.addEventListener(evt, unlockAudio, { once: false });
    });

    soundBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      isMuted = !isMuted;

      if (typeof musicSystem !== 'undefined') {
        // Mutar/desmutar todas as tracks
        ['intro', 'fase1'].forEach(t => {
          if (musicSystem[t]) musicSystem[t].muted = isMuted;
        });
      }

      soundBtn.textContent = isMuted ? '✕' : '♪';
      soundBtn.classList.toggle('muted', isMuted);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SuperTom: A Jornada do Coração Elétrico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* Botão de som flutuante */
    #soundBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      border: 2px solid #f5a623;
      color: #f5a623;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      transition: background 0.2s;
    }
    #soundBtn:hover { background: rgba(245,166,35,0.2); }
    #soundBtn.muted { border-color: #555; color: #555; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Botão de som -->
  <button id="soundBtn" title="Ligar/Desligar Música">♪</button>

  <!-- Áudio da trilha sonora -->
  <audio id="bgMusic" loop preload="auto">
    <source src="supertom_theme.ogg" type="audio/ogg">
    <source src="supertom_theme.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ─── SISTEMA DE ÁUDIO ───────────────────────────────────────────
    const bgMusic = document.getElementById('bgMusic');
    const soundBtn = document.getElementById('soundBtn');
    let musicStarted = false;
    let isMuted = false;

    bgMusic.volume = 0.55;

    function startMusic() {
      if (!musicStarted) {
        bgMusic.play().then(() => {
          musicStarted = true;
        }).catch(() => {
          // Autoplay bloqueado — aguarda interação
        });
      }
    }

    // Inicia música na primeira interação do usuário
    ['click', 'touchstart', 'keydown'].forEach(evt => {
      document.addEventListener(evt, startMusic, { once: false });
    });

    // Botão de mute
    soundBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      isMuted = !isMuted;
      bgMusic.muted = isMuted;
      soundBtn.textContent = isMuted ? '✕' : '♪';
      soundBtn.classList.toggle('muted', isMuted);
      if (!musicStarted) startMusic();
    });

    // Expõe controle de áudio para o game.js
    window.gameAudio = {
      start: startMusic,
      mute: () => { bgMusic.muted = true; isMuted = true; },
      unmute: () => { bgMusic.muted = false; isMuted = false; },
      setVolume: (v) => { bgMusic.volume = Math.max(0, Math.min(1, v)); },
      isPlaying: () => musicStarted && !bgMusic.paused,
    };
  </script>

  <script src="game.js"></script>
</body>
</html>
